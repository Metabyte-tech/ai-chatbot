version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "npm install -g pnpm@9.12.3"
        - "pnpm install"
    build:
      commands:
        - "echo \"AUTH_SECRET=$AUTH_SECRET\" >> .env.production"
        - "echo \"AUTH_TRUST_HOST=true\" >> .env.production"
        - "echo \"POSTGRES_URL=$POSTGRES_URL\" >> .env.production"
        - "echo \"AI_GATEWAY_API_KEY=$AI_GATEWAY_API_KEY\" >> .env.production"
        - "echo \"BLOB_READ_WRITE_TOKEN=$BLOB_READ_WRITE_TOKEN\" >> .env.production"
        - "echo \"REDIS_URL=$REDIS_URL\" >> .env.production"
        - "pnpm run build"
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - ".next/cache/**/*"
      - "node_modules/**/*"
