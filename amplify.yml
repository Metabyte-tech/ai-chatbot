version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "npm install -g pnpm@9.12.3"
        - "pnpm install"
    build:
      commands:
        - "echo \"AUTH_SECRET=$AUTH_SECRET\" >> .env.production"
        - "echo \"POSTGRES_URL=$POSTGRES_URL\" >> .env.production"
        - "pnpm run build"
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - ".next/cache/**/*"
      - "node_modules/**/*"
